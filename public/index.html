<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c6cf0, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: #888;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 640px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }
    input[type="url"] {
      flex: 1;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e2e8;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus { border-color: #7c6cf0; }
    input[type="url"]::placeholder { color: #555; }

    button.shorten-btn {
      background: linear-gradient(135deg, #7c6cf0, #a78bfa);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    button.shorten-btn:hover { opacity: 0.85; }
    button.shorten-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    .result-box {
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 16px;
      margin-top: 20px;
      display: none;
    }
    .result-box .label { color: #888; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .result-row { display: flex; align-items: center; gap: 10px; }
    .result-row a { color: #a78bfa; font-size: 1.05rem; font-weight: 600; text-decoration: none; flex: 1; }
    .result-row a:hover { text-decoration: underline; }
    button.copy-btn {
      background: #2a2a3a;
      border: none;
      border-radius: 8px;
      color: #ccc;
      padding: 7px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.copy-btn:hover { background: #3a3a50; }
    .orig-url { color: #555; font-size: 0.8rem; margin-top: 8px; word-break: break-all; }

    .history-section { width: 100%; max-width: 640px; margin-top: 36px; }
    .history-section h2 { font-size: 1rem; color: #888; margin-bottom: 14px; }

    .url-list { display: flex; flex-direction: column; gap: 10px; }
    .url-item {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .url-item .info { flex: 1; min-width: 0; }
    .url-item .short { color: #a78bfa; font-weight: 600; font-size: 0.9rem; }
    .url-item .original {
      color: #555;
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }
    .url-item .meta { color: #444; font-size: 0.75rem; margin-top: 2px; }
    .url-item .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .url-item button {
      background: #2a2a3a;
      border: none;
      border-radius: 7px;
      color: #aaa;
      padding: 5px 10px;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .url-item button:hover { background: #3a3a50; }
    .url-item button.del { color: #f87171; }
    .url-item button.del:hover { background: #3a1a1a; }

    .empty { color: #444; font-size: 0.88rem; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>

<header>
  <h1>⚡ URL Shortener</h1>
  <p>Paste a long URL and get a short shareable link</p>
</header>

<div class="card">
  <div class="input-row">
    <input type="url" id="urlInput" placeholder="https://example.com/very/long/url..." />
    <button class="shorten-btn" id="shortenBtn" onclick="shorten()">Shorten</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="result-box" id="resultBox">
    <div class="label">Your short link</div>
    <div class="result-row">
      <a id="resultLink" href="#" target="_blank"></a>
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
    <div class="orig-url" id="resultOrig"></div>
  </div>
</div>

<div class="history-section">
  <h2>Recent URLs</h2>
  <div class="url-list" id="urlList">
    <div class="empty">No URLs shortened yet.</div>
  </div>
</div>

<script>
  const API = "";

  async function shorten() {
    const input = document.getElementById("urlInput");
    const btn = document.getElementById("shortenBtn");
    const err = document.getElementById("errorMsg");
    const box = document.getElementById("resultBox");

    const url = input.value.trim();
    err.style.display = "none";
    box.style.display = "none";

    if (!url) { showError("Please enter a URL."); return; }

    btn.disabled = true;
    btn.textContent = "Shortening…";

    try {
      const res = await fetch(`${API}/api/shorten`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error); return; }

      document.getElementById("resultLink").href = data.shortUrl;
      document.getElementById("resultLink").textContent = data.shortUrl;
      document.getElementById("resultOrig").textContent = data.originalUrl;
      box.style.display = "block";

      input.value = "";
      loadHistory();
    } catch {
      showError("Server error. Is the backend running?");
    } finally {
      btn.disabled = false;
      btn.textContent = "Shorten";
    }
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.style.display = "block";
  }

  function copyLink() {
    const url = document.getElementById("resultLink").href;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector(".copy-btn");
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    });
  }

  async function loadHistory() {
    const list = document.getElementById("urlList");
    try {
      const res = await fetch(`${API}/api/urls`);
      const urls = await res.json();

      if (!urls.length) {
        list.innerHTML = `<div class="empty">No URLs shortened yet.</div>`;
        return;
      }

      list.innerHTML = urls.map(u => `
        <div class="url-item" id="item-${u.shortCode}">
          <div class="info">
            <div class="short"><a href="${u.shortUrl}" target="_blank">${u.shortUrl}</a></div>
            <div class="original" title="${u.originalUrl}">${u.originalUrl}</div>
            <div class="meta">👆 ${u.clicks} click${u.clicks !== 1 ? "s" : ""} &nbsp;·&nbsp; ${new Date(u.createdAt).toLocaleDateString()}</div>
          </div>
          <div class="actions">
            <button onclick="navigator.clipboard.writeText('${u.shortUrl}')">Copy</button>
            <button class="del" onclick="deleteUrl('${u.shortCode}')">Delete</button>
          </div>
        </div>
      `).join("");
    } catch {
      list.innerHTML = `<div class="empty">Could not load history.</div>`;
    }
  }

  async function deleteUrl(code) {
    await fetch(`/api/urls/${code}`, { method: "DELETE" });
    loadHistory();
  }

  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") shorten();
  });

  loadHistory();
</script>
</body>
</html>
